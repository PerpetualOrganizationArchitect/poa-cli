<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0f0f1a"/>
    </radialGradient>
    <radialGradient id="iris" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="60%" stop-color="#0088cc"/>
      <stop offset="100%" stop-color="#004466"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>

  <!-- Outer glow ring -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.3"/>
  <circle cx="256" cy="256" r="200" fill="none" stroke="#00d4ff" stroke-width="0.5" opacity="0.15"/>

  <!-- Eye shape - outer -->
  <ellipse cx="256" cy="256" rx="140" ry="90" fill="none" stroke="#00d4ff" stroke-width="2.5" opacity="0.8"/>

  <!-- Eye shape - inner white -->
  <ellipse cx="256" cy="256" rx="130" ry="82" fill="#0d1117" opacity="0.9"/>

  <!-- Iris -->
  <circle cx="256" cy="256" r="60" fill="url(#iris)"/>

  <!-- Pupil -->
  <circle cx="256" cy="256" r="24" fill="#0f0f1a"/>

  <!-- Pupil highlight -->
  <circle cx="244" cy="244" r="8" fill="#ffffff" opacity="0.7"/>
  <circle cx="264" cy="252" r="4" fill="#ffffff" opacity="0.4"/>

  <!-- Network nodes around the eye - representing governance/connections -->
  <!-- Top nodes -->
  <circle cx="256" cy="130" r="5" fill="#00d4ff" opacity="0.8"/>
  <circle cx="190" cy="148" r="4" fill="#00d4ff" opacity="0.6"/>
  <circle cx="322" cy="148" r="4" fill="#00d4ff" opacity="0.6"/>

  <!-- Bottom nodes -->
  <circle cx="256" cy="382" r="5" fill="#00d4ff" opacity="0.8"/>
  <circle cx="190" cy="364" r="4" fill="#00d4ff" opacity="0.6"/>
  <circle cx="322" cy="364" r="4" fill="#00d4ff" opacity="0.6"/>

  <!-- Side nodes -->
  <circle cx="100" cy="256" r="4" fill="#00d4ff" opacity="0.5"/>
  <circle cx="412" cy="256" r="4" fill="#00d4ff" opacity="0.5"/>

  <!-- Connection lines between nodes -->
  <line x1="190" y1="148" x2="256" y2="130" stroke="#00d4ff" stroke-width="0.8" opacity="0.3"/>
  <line x1="322" y1="148" x2="256" y2="130" stroke="#00d4ff" stroke-width="0.8" opacity="0.3"/>
  <line x1="190" y1="364" x2="256" y2="382" stroke="#00d4ff" stroke-width="0.8" opacity="0.3"/>
  <line x1="322" y1="364" x2="256" y2="382" stroke="#00d4ff" stroke-width="0.8" opacity="0.3"/>
  <line x1="100" y1="256" x2="190" y2="148" stroke="#00d4ff" stroke-width="0.5" opacity="0.2"/>
  <line x1="412" y1="256" x2="322" y2="148" stroke="#00d4ff" stroke-width="0.5" opacity="0.2"/>
  <line x1="100" y1="256" x2="190" y2="364" stroke="#00d4ff" stroke-width="0.5" opacity="0.2"/>
  <line x1="412" y1="256" x2="322" y2="364" stroke="#00d4ff" stroke-width="0.5" opacity="0.2"/>

  <!-- Subtle scan lines for tech feel -->
  <line x1="126" y1="256" x2="196" y2="256" stroke="#00d4ff" stroke-width="1" opacity="0.15"/>
  <line x1="316" y1="256" x2="386" y2="256" stroke="#00d4ff" stroke-width="1" opacity="0.15"/>

  <!-- Text: ARGUS -->
  <text x="256" y="440" text-anchor="middle" font-family="monospace" font-size="36" font-weight="bold" fill="#00d4ff" letter-spacing="12" opacity="0.9">ARGUS</text>
</svg>
